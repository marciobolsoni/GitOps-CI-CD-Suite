name: "CD — Deploy to Staging (Canary)"

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: ""
      skip_approval:
        description: "Skip manual approval gate"
        type: boolean
        default: false

concurrency:
  group: cd-staging
  cancel-in-progress: false  # Never cancel in-flight deployments

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: marciobolsoni-cloud
  ECS_CLUSTER: marciobolsoni-cloud-staging
  ECS_SERVICE: marciobolsoni-web-staging
  CODEDEPLOY_APP: marciobolsoni-cloud
  CODEDEPLOY_GROUP: marciobolsoni-staging
  ENVIRONMENT: staging

permissions:
  id-token: write
  contents: write
  deployments: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Pre-Deployment Health Check
  # ─────────────────────────────────────────────
  pre-deploy-checks:
    name: "Pre-Deployment Health Checks"
    runs-on: ubuntu-latest
    outputs:
      current-task-def: ${{ steps.get-task-def.outputs.task-def }}
      image-tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CD-Staging-PreCheck-${{ github.run_id }}

      - name: Resolve image tag
        id: resolve-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Get current ECS task definition
        id: get-task-def
        run: |
          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "task-def=${TASK_DEF}" >> $GITHUB_OUTPUT
          echo "Current task definition: ${TASK_DEF}"

      - name: Health check current production
        run: |
          HEALTH=$(curl -sf --max-time 10 \
            https://staging.marciobolsoni.cloud/health | jq -r '.status' || echo "unhealthy")
          echo "Current health status: ${HEALTH}"
          if [ "${HEALTH}" != "healthy" ]; then
            echo "⚠️ Warning: Current staging environment is not healthy"
          fi

      - name: Verify image exists in ECR
        run: |
          TAG=${{ steps.resolve-tag.outputs.tag }}
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${TAG} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Image verified: ${TAG}"

  # ─────────────────────────────────────────────
  # Job 2: Terraform Apply (Infrastructure)
  # ─────────────────────────────────────────────
  terraform-apply:
    name: "Terraform Apply — Staging"
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    environment:
      name: staging-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TFApply-Staging-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/staging
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/staging
        run: terraform apply -auto-approve -var="image_tag=${{ needs.pre-deploy-checks.outputs.image-tag }}"

  # ─────────────────────────────────────────────
  # Job 3: Canary Deployment via CodeDeploy
  # ─────────────────────────────────────────────
  canary-deploy:
    name: "Canary Deployment — Staging"
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, terraform-apply]
    environment:
      name: staging
      url: https://staging.marciobolsoni.cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CD-Staging-Deploy-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/appspec/task-definition-staging.json
          container-name: marciobolsoni-web
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.pre-deploy-checks.outputs.image-tag }}
          environment-variables: |
            ENVIRONMENT=staging
            VERSION=${{ needs.pre-deploy-checks.outputs.image-tag }}
            GIT_COMMIT=${{ github.sha }}

      - name: Deploy to ECS via CodeDeploy (Canary)
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          codedeploy-appspec: infrastructure/appspec/appspec-staging.yml
          codedeploy-application: ${{ env.CODEDEPLOY_APP }}
          codedeploy-deployment-group: ${{ env.CODEDEPLOY_GROUP }}

      - name: Wait for canary observation window
        run: |
          echo "⏳ Canary deployed at 10% traffic. Observing for 5 minutes..."
          sleep 300

      - name: Run smoke tests against canary
        run: |
          chmod +x scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh staging ${{ needs.pre-deploy-checks.outputs.image-tag }}

      - name: Check CloudWatch alarms during canary
        run: |
          chmod +x scripts/check-alarms.sh
          ./scripts/check-alarms.sh ${{ env.ENVIRONMENT }}

  # ─────────────────────────────────────────────
  # Job 4: Post-Deployment Validation
  # ─────────────────────────────────────────────
  post-deploy-validation:
    name: "Post-Deployment Validation"
    runs-on: ubuntu-latest
    needs: canary-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e-tests.sh
          ./scripts/e2e-tests.sh https://staging.marciobolsoni.cloud

      - name: Performance baseline comparison
        run: |
          chmod +x scripts/perf-check.sh
          ./scripts/perf-check.sh staging

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Staging Deployment Successful*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Staging Canary Deployment Successful*\n*Repo:* marciobolsoni.cloud\n*Version:* `${{ needs.pre-deploy-checks.outputs.image-tag }}`\n*Commit:* `${{ github.sha }}`\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *Staging Deployment FAILED — Rollback Initiated*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *Staging Deployment FAILED*\n*Repo:* marciobolsoni.cloud\n*Version:* `${{ needs.pre-deploy-checks.outputs.image-tag }}`\n*Commit:* `${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
